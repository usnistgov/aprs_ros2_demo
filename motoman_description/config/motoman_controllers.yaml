controller_manager:
  ros__parameters:
    update_rate: 125 # Hz
  
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    forward_position_controller:
      type: forward_command_controller/ForwardCommandController

    gripper_controller:
      type: forward_command_controller/ForwardCommandController

forward_position_controller:
  ros__parameters:
    joints:
      - joint_s
      - joint_l
      - joint_e    
      - joint_u
      - joint_r
      - joint_b
      - joint_t
    
    interface_name: position

gripper_controller:
  ros__parameters:
    joints:
      - motoman_prism1
      - motoman_prism2
    
    interface_name: position
